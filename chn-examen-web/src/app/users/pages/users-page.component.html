<p-toast position="top-right" />
<p-confirmDialog />

<div class="page-container">
  <div class="page-header">
    <div class="page-title-group">
      <h1 class="page-title">Usuarios</h1>
      <span class="page-subtitle">Administración de credenciales de acceso</span>
    </div>
    <p-button label="Nuevo usuario" icon="pi pi-plus" (onClick)="onNew()" />
  </div>

  <div class="page-toolbar">
    <p-iconfield iconPosition="left" styleClass="search-field">
      <p-inputicon styleClass="pi pi-search" />
      <input
        pInputText
        type="text"
        placeholder="Buscar por usuario..."
        [ngModel]="searchQuery()"
        (ngModelChange)="searchQuery.set($event)"
      />
    </p-iconfield>
  </div>

  <div class="table-card">
    <p-table
      [value]="filteredUsers()"
      [loading]="loading()"
      styleClass="p-datatable-gridlines"
      [tableStyle]="{ 'min-width': '50rem' }"
    >
      <ng-template #header>
        <tr>
          <th pSortableColumn="id" style="width: 60px"># <p-sortIcon field="id" /></th>
          <th pSortableColumn="username">Usuario <p-sortIcon field="username" /></th>
          <th pSortableColumn="employeeId">ID Empleado Asignado <p-sortIcon field="employeeId" /></th>
          <th style="width: 120px; text-align: center">Acciones</th>
        </tr>
      </ng-template>

      <ng-template #loadingbody>
        @for (_ of [1,2,3,4,5]; track $index) {
          <tr>
            <td><p-skeleton /></td>
            <td><p-skeleton /></td>
            <td><p-skeleton /></td>
            <td style="text-align:center"><p-skeleton width="5rem" styleClass="m-auto" /></td>
          </tr>
        }
      </ng-template>

      <ng-template #body let-user>
        <tr>
          <td>{{ user.id }}</td>
          <td>{{ user.username }}</td>
          <td>Emp-{{ user.employeeId }}</td>
          <td class="action-cell">
            <p-button
              icon="pi pi-pencil"
              [rounded]="true"
              [text]="true"
              severity="secondary"
              (onClick)="onEdit(user)"
              pTooltip="Editar"
            />
            <p-button
              icon="pi pi-trash"
              [rounded]="true"
              [text]="true"
              severity="danger"
              (onClick)="onDelete(user)"
              pTooltip="Eliminar"
            />
          </td>
        </tr>
      </ng-template>

      <ng-template #emptymessage>
        <tr>
          <td colspan="4" class="empty-message">
            <span class="pi pi-inbox empty-icon"></span>
            <p>No se encontraron usuarios.</p>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

@if (showForm()) {
  <app-user-form
    [user]="formUser() ?? null"
    (saved)="onSaved($event)"
    (cancelled)="onCancelled()"
  />
}
