<div class="login-wrapper">
  <div class="login-card">

    <div class="login-header">
      <h1 class="login-title">CHN Sistema</h1>
      <p class="login-subtitle">Ingresa tus credenciales para continuar</p>
    </div>

    @if (errorMessage()) {
      <p-message severity="error" [text]="errorMessage()!" styleClass="w-full mb-4" />
    }

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">

      <div class="field">
        <label for="username" class="field-label">Usuario</label>
        <input
          id="username"
          type="text"
          pInputText
          formControlName="username"
          placeholder="Tu nombre de usuario"
          class="w-full"
          autocomplete="username"
        />
        @if (loginForm.get('username')?.invalid && loginForm.get('username')?.touched) {
          <small class="field-error">El usuario es requerido.</small>
        }
      </div>

      <div class="field">
        <label for="password" class="field-label">Contraseña</label>
        <p-password
          inputId="password"
          formControlName="password"
          placeholder="Tu contraseña"
          [feedback]="false"
          [toggleMask]="true"
          styleClass="w-full"
          inputStyleClass="w-full"
          autocomplete="current-password"
        />
        @if (loginForm.get('password')?.invalid && loginForm.get('password')?.touched) {
          <small class="field-error">La contraseña es requerida.</small>
        }
      </div>

      <p-button
        type="submit"
        label="Iniciar sesión"
        icon="pi pi-sign-in"
        styleClass="w-full"
        [loading]="loading()"
        [disabled]="loginForm.invalid || loading()"
      />

    </form>
  </div>
</div>
